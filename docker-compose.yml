version: '3.8'

services:
  postgres:
    image: timescale/timescaledb:latest-pg15
    container_name: pro-monitor-postgres
    environment:
      POSTGRES_USER: pro_monitor
      POSTGRES_PASSWORD: pro_monitor
      POSTGRES_DB: pro_monitor
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pro_monitor"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pro-monitor-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: pro-monitor-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pro-monitor-network
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: pro-monitor-backend
    environment:
      DATABASE_URL: "postgresql://pro_monitor:pro_monitor@postgres:5432/pro_monitor"
      JWT_SECRET: "${JWT_SECRET:-change-this-secret-in-production}"
      PORT: 3001
      HOST: 0.0.0.0
      NODE_ENV: "${NODE_ENV:-development}"
      REDIS_URL: "redis://redis:6379"
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - pro-monitor-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        VITE_API_BASE_URL: "${VITE_API_BASE_URL:-http://localhost:3001}"
    container_name: pro-monitor-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - pro-monitor-network
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: pro-monitor-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - pro-monitor-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  pro-monitor-network:
    driver: bridge

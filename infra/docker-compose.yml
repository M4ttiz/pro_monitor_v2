services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: pro-monitor-timescaledb
    restart: unless-stopped
    environment:
      POSTGRES_DB: pro_monitor
      POSTGRES_USER: pro_monitor
      POSTGRES_PASSWORD: pro_monitor
    ports:
      - "5432:5432"
    volumes:
      - timescale_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: pro-monitor-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  timescale_data:
  redis_data:
